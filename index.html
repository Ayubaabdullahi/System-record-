<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Classes · Brilliant Academy</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    :root{
      --brand:#003366;
      --gold:#ffb400;
      --success:#16a34a;
      --danger:#ef4444;
      --card:#fff;
      --shadow:0 12px 30px rgba(0,0,0,.08);
      --glow:0 0 25px rgba(255,180,0,.5);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#f8fafc,#e2e8f0);color:#1e293b;min-height:100vh}

    .header{
      background:linear-gradient(135deg,var(--brand),#001f3f);
      color:#fff;
      text-align:center;
      padding:2.5rem 1rem 2rem;
      position:relative;
      box-shadow:0 8px 32px rgba(0,0,0,.3);
    }
    .header::before{
      content:''; position:absolute; inset:0;
      background:radial-gradient(circle at 20% 50%,rgba(255,180,0,.15),transparent 70%);
      pointer-events:none;
    }
    .logo{height:92px;border-radius:20px;border:4px solid var(--gold);margin-bottom:1rem;box-shadow:var(--glow);}
    .school-name{font-size:30px;font-weight:800;text-shadow:0 2px 10px rgba(0,0,0,.4)}
    .tagline{font-size:17px;opacity:.95;margin:8px 0}
    .motto{font-size:15px;color:var(--gold);font-weight:700;letter-spacing:1.2px;margin-top:12px;}

    .hamburger{
      position:absolute;left:1.2rem;top:2.2rem;
      background:var(--gold);color:var(--brand);border:none;
      width:56px;height:56px;border-radius:50%;font-size:24px;
      cursor:pointer;display:none;align-items:center;justify-content:center;
      box-shadow:0 6px 20px rgba(0,0,0,.3);z-index:101;transition:.4s;
    }
    .hamburger:hover{transform:scale(1.1);box-shadow:var(--glow);}

    .nav{padding:1rem;background:#fff;box-shadow:var(--shadow);text-align:center;color:#64748b;}

    .sidebar{
      position:fixed;left:-340px;top:0;width:340px;height:100%;
      background:linear-gradient(135deg,var(--brand),#001f3f);
      padding-top:100px;transition:.4s ease;z-index:100;
      box-shadow:5px 0 30px rgba(0,0,0,.4);
    }
    .sidebar.active{left:0}
    .sidebar a{
      display:flex;align-items:center;gap:18px;
      padding:1.3rem 2rem;color:#fff;text-decoration:none;
      font-weight:600;font-size:16px;transition:.3s;
    }
    .sidebar a i{width:28px;text-align:center}
    .sidebar a:hover{background:rgba(255,180,0,.25);padding-left:3rem;}

    .container{max-width:1200px;margin:0 auto;padding:1.5rem}
    .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
    .search-input{padding:14px 20px;border:2px solid #e2e8f0;border-radius:16px;width:100%;max-width:380px;font-size:16px;transition:.3s;}
    .search-input:focus{outline:none;border-color:var(--gold);box-shadow:var(--glow);}

    #createBtn{
      background:linear-gradient(45deg,var(--gold),#ff8c00);
      color:var(--brand);border:none;padding:16px 36px;
      border-radius:50px;font-weight:800;font-size:17px;cursor:pointer;
      box-shadow:0 8px 25px rgba(255,180,0,.5);transition:.4s;
      display:flex;align-items:center;gap:12px;
    }
    #createBtn:hover{transform:translateY(-5px) scale(1.05);box-shadow:0 15px 35px rgba(255,180,0,.7);}

    .classes-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:1.8rem}
    .class-card{background:var(--card);border-radius:24px;overflow:hidden;box-shadow:var(--shadow);transition:.4s;border:3px solid transparent;cursor:pointer}
    .class-card:hover{transform:translateY(-15px);border-color:var(--gold);box-shadow:0 25px 50px rgba(0,0,0,.18),var(--glow)}
    .class-header{background:linear-gradient(45deg,var(--brand),#00509e);color:#fff;padding:2rem 1.5rem;text-align:center}
    .class-icon{width:90px;height:90px;background:var(--gold);color:var(--brand);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;margin:0 auto 1rem;box-shadow:0 0 20px rgba(0,0,0,.3)}
    .class-name{font-size:22px;font-weight:800}
    .class-body{padding:2rem 1.5rem}
    .progress-bar{height:14px;background:#e2e8f0;border-radius:8px;overflow:hidden;margin:1.5rem 0}
    .fill{height:100%;background:var(--success);border-radius:8px;transition:width .8s ease}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:1rem;font-size:15px;margin:1.5rem 0}
    .stats div strong{font-size:20px;display:block;color:var(--brand)}
    .paid{color:var(--success);font-weight:700}
    .owing{color:var(--danger);font-weight:700}
    .actions{display:flex;gap:.8rem;margin-top:1.5rem}
    .actions button{padding:10px;border:none;border-radius:12px;font-weight:700;cursor:pointer;flex:1;transition:.3s}
    .view{background:#0ea5e9;color:#fff}
    .edit{background:#f59e0b;color:#fff}
    .del{background:#ef4444;color:#fff}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);align-items:center;justify-content:center;z-index:1000;padding:1rem;backdrop-filter:blur(6px)}
    .modal.show{display:flex}
    .modal-card{background:#fff;padding:2.5rem;border-radius:20px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
    .modal input{width:100%;padding:14px;border:2px solid #e2e8f0;border-radius:16px;margin:12px 0;font-size:16px;transition:.3s}
    .modal input:focus{outline:none;border-color:var(--gold);box-shadow:var(--glow)}
    .modal button{width:100%;padding:14px;background:var(--brand);color:#fff;border:none;border-radius:16px;font-weight:700;cursor:pointer;margin-top:1rem;transition:.3s}
    .modal button:hover{background:#001f3f;transform:translateY(-2px)}
    .no-data{text-align:center;padding:4rem;color:#64748b;font-size:19px;font-weight:600}

    @media (max-width:868px){
      .hamburger{display:flex}
      .top-bar{flex-direction:column}
      .search-input{max-width:100%}
    }
  </style>
</head>
<body>

  <header class="header">
    <button class="hamburger" id="hambtn"><i class="fas fa-bars"></i></button>
    <img src="./brilliant1.jpg" alt="Logo" class="logo">
    <div class="school-name">Brilliant Footsteps Intnl Academy — Sokoto</div>
    <div class="tagline">Professional School Fees Management System</div>
    <div class="motto">“Building Tomorrow’s Leaders Through Excellence & Discipline”</div>
  </header>

  <nav class="nav"></nav>

  <nav id="sidebar" class="sidebar">
    <a href="./classes-updated.html"><i class="fas fa-chalkboard-teacher"></i> Classes</a>
    <a href="./students.html"><i class="fas fa-user-graduate"></i> Students</a>
    <a href="./admin-panel.html"><i class="fas fa-chart-line"></i> Financial Panel</a>
    <a href="./parents-look.html"><i class="fas fa-users"></i> Parent Portal</a>
    <a href="./fees-history.html"><i class="fas fa-history"></i> Fees History</a>
    <a href="reports.html"><i class="fas fa-file-alt"></i> Reports</a>
    <a href="./settings.html"><i class="fas fa-cog"></i> Settings</a>
    <a href="./logout.html"><i class="fas fa-sign-out-alt"></i> Logout</a>
  </nav>

  <div class="container">
    <div class="top-bar">
      <input type="text" id="searchInput" class="search-input" placeholder="Search class by name...">
      <button id="createBtn"><i class="fas fa-plus-circle"></i> Create New Class</button>
    </div>

    <div id="classesGrid" class="classes-grid">
      <div class="no-data">Loading classes...</div>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-card">
      <h3 id="modalTitle">Create New Class</h3>
      <input id="classNameInput" placeholder="Class Name (e.g. Primary 4A)">
      <input id="classFeesInput" type="number" placeholder="Fees per Term (₦)">
      <button id="saveClassBtn">Save Class</button>
      <button id="closeModal" style="background:#ef4444;margin-top:8px">Cancel</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
    import { 
      getFirestore, collection, doc, getDocs, onSnapshot, 
      setDoc, updateDoc, deleteDoc, serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDm35w4edp811CsLhyiUSUqlkEt69_BWYU",
      authDomain: "loginsysterm.firebaseapp.com",
      projectId: "loginsysterm",
      storageBucket: "loginsysterm.fireasestorage.app",
      messagingSenderId: "181422276481",
      appId: "1:181422276481:web:0a74d8a68c2446a4673280"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);            // GYARAN NAN – 100% CORRECT YANZU!

    const grid = document.getElementById('classesGrid');
    const searchInput = document.getElementById('searchInput');
    const createBtn = document.getElementById('createBtn');
    const modal = document.getElementById('modal');
    const closeModal = document.getElementById('closeModal');
    const saveClassBtn = document.getElementById('saveClassBtn');
    const classNameInput = document.getElementById('classNameInput');
    const classFeesInput = document.getElementById('classFeesInput');
    const hambtn = document.getElementById('hambtn');
    const sidebar = document.getElementById('sidebar');

    let editingClassId = null;

    const formatMoney = n => '₦' + Number(n).toLocaleString();

    hambtn.onclick = () => sidebar.classList.toggle('active');
    closeModal.onclick = () => { modal.classList.remove('show'); editingClassId = null; };
    window.onclick = e => { if (e.target === modal) modal.classList.remove('show'); };

    createBtn.onclick = () => {
      editingClassId = null;
      classNameInput.value = '';
      classFeesInput.value = '';
      document.getElementById('modalTitle').textContent = 'Create New Class';
      modal.classList.add('show');
    };

    saveClassBtn.onclick = async () => {
      const name = classNameInput.value.trim();
      const fees = Number(classFeesInput.value) || 0;
      if (!name || fees <= 0) return alert('Fill all fields correctly');

      const slug = name.toLowerCase().replace(/[^a-z0-9]/g, '');

      try {
        if (editingClassId) {
          await updateDoc(doc(db, 'classes', editingClassId), { name, slug, feesPerTerm: fees });
          alert('Class updated!');
        } else {
          await setDoc(doc(db, 'classes', slug), { 
            name, slug, feesPerTerm: fees, createdAt: serverTimestamp() 
          });
          alert('Class created: ' + name);
        }
        modal.classList.remove('show');
      } catch (e) { 
        console.error(e); 
        alert('Error: ' + e.message); 
      }
    };

    async function renderClasses() {
      const search = searchInput.value.toLowerCase().trim();
      grid.innerHTML = '<div class="no-data">Loading classes...</div>';

      try {
        const [classesSnap, studentsSnap] = await Promise.all([
          getDocs(collection(db, 'classes')),
          getDocs(collection(db, 'students'))
        ]);

        const stats = {};
        studentsSnap.forEach(sdoc => {
          const s = sdoc.data();
          const cid = s.classSlug;
          if (!stats[cid]) stats[cid] = { count: 0, expected: 0, paid: 0 };
          stats[cid].count++;
          const term = s.terms?.term1 || { feesRequired: 0, totalPaid: 0 };
          stats[cid].expected += term.feesRequired;
          stats[cid].paid += term.totalPaid;
        });

        grid.innerHTML = '';
        if (classesSnap.empty) {
          grid.innerHTML = '<div class="no-data">No classes yet. Click "+ Create Class"</div>';
          return;
        }

        let hasMatch = false;
        classesSnap.forEach(cdoc => {
          const c = cdoc.data();
          if (c.name && !c.name.toLowerCase().includes(search)) return;
          hasMatch = true;

          const st = stats[cdoc.id] || { count: 0, expected: 0, paid: 0 };
          const pct = st.expected > 0 ? (st.paid / st.expected) * 100 : 0;
          const out = st.expected - st.paid;

          const card = document.createElement('div');
          card.className = 'class-card';
          card.innerHTML = `
            <div class="class-header">
              <div class="class-icon">${(cdoc.id || '').toUpperCase().replace(/\d/g,'') || 'C'}</div>
              <div class="class-name">${c.name || 'Unknown'}</div>
            </div>
            <div class="class-body">
              <div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div>
              <div class="stats">
                <div><strong>${st.count}</strong> Students</div>
                <div>₦${formatMoney(st.expected)} Expected</div>
                <div class="paid">₦${formatMoney(st.paid)} Paid</div>
                <div class="owing">₦${formatMoney(out)} Owing</div>
              </div>
              <div class="actions">
                <button class="view">View Details</button>
                <button class="edit">Edit</button>
                <button class="del">Delete</button>
              </div>
            </div>
          `;

          card.querySelector('.view').onclick = (e) => {
            e.stopPropagation();
            window.location.href = `./students.html?id=${cdoc.id}`;
          };

          card.querySelector('.edit').onclick = (e) => {
            e.stopPropagation();
            editingClassId = cdoc.id;
            classNameInput.value = c.name || '';
            classFeesInput.value = c.feesPerTerm || '';
            document.getElementById('modalTitle').textContent = 'Edit Class';
            modal.classList.add('show');
          };

          card.querySelector('.del').onclick = async (e) => {
            e.stopPropagation();
            if (confirm(`Delete ${c.name || 'this class'}?`)) {
              await deleteDoc(doc(db, 'classes', cdoc.id));
            }
          };

          grid.appendChild(card);
        });

        if (!hasMatch && search) {
          grid.innerHTML = '<div class="no-data">No classes match your search.</div>';
        }

      } catch (err) {
        console.error(err);
        grid.innerHTML = `<div class="no-data">Error: ${err.message}</div>`;
      }
    }

    let searchTimeout;
    searchInput.oninput = () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(renderClasses, 300);
    };

    onSnapshot(collection(db, 'classes'), () => renderClasses());
    onSnapshot(collection(db, 'students'), () => renderClasses());

    renderClasses();
  </script>
</body>
</html>
